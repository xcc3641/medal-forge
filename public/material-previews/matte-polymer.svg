<svg width="96" height="96" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="body" cx="32%" cy="25%" r="75%">
      <stop offset="0%" stop-color="#8eb6d6"/>
      <stop offset="34%" stop-color="#4c7fa5"/>
      <stop offset="68%" stop-color="#254968"/>
      <stop offset="100%" stop-color="#0f2233"/>
    </radialGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency=".9" numOctaves="2" seed="8"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .06"/>
      </feComponentTransfer>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="5" flood-color="#07111a" flood-opacity=".34"/>
    </filter>
  </defs>
  <circle cx="48" cy="49" r="34" fill="url(#body)" filter="url(#shadow)"/>
  <circle cx="48" cy="49" r="34" filter="url(#noise)"/>
  <ellipse cx="36" cy="31" rx="15" ry="8" fill="#ffffff" opacity=".22" transform="rotate(-30 36 31)"/>
  <path d="M25 63C36 78 60 80 73 62" fill="none" stroke="#061521" stroke-opacity=".18" stroke-width="5" stroke-linecap="round"/>
</svg>
